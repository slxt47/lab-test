events { worker_connections 1024; }

http {
    # Globale Proxy-Einstellungen für reibungslosen HTTP-Betrieb
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Maximale Dateiupload-Größe (wichtig für Nextcloud)
    client_max_body_size 512M;

    # 1. Routing für Nextcloud
    server {
        listen 80;
        server_name nextcloud.*; # Reagiert auf nextcloud.deinedomain.tld

        location / {
            proxy_pass http://nextcloud:80;
        }
    }

    # 2. Routing für Portainer
    server {
        listen 80;
        server_name portainer.*; # Reagiert auf portainer.deinedomain.tld

        location / {
            proxy_pass http://portainer:9000;
        }
    }

    # 3. Routing für MailHog Web-Interface
    server {
        listen 80;
        server_name mailhog.*; # Reagiert auf mailhog.deinedomain.tld

        location / {
            proxy_pass http://mailhog:8025;
        }
    }
}